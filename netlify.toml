[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/analyze"
  to = "/.netlify/functions/analyze"
  status = 200

[[redirects]]
  from = "/api/generate-diagram"
  to = "/.netlify/functions/generate-diagram"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
